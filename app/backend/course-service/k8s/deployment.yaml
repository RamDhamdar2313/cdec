apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-service
  namespace: cloudblitz
  labels:
    app: course-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: course-service
  template:
    metadata:
      labels:
        app: course-service
        version: v1
    spec:
      containers:
      - name: course-service
        image: 936532784238.dkr.ecr.ap-south-1.amazonaws.com/course-service:latest
        ports:
        - containerPort: 8082
